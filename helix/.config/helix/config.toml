theme = "gruvbox"

[editor]
line-number = "absolute"
mouse = true
bufferline = "multiple"
cursorline = true # Highlight all lines with a cursor
rulers = [120] # Show a ruler at column 120 but I don't like it
true-color = true # Force the theme to show colors
color-modes = true
end-of-line-diagnostics = "hint"

[editor.file-picker]
hidden = false

[editor.soft-wrap]
enable = true
max-wrap = 80 # increase value to reduce forced mid-word wrapping
max-indent-retain = 0
wrap-indicator = ""  # set wrap-indicator to "" to hide it

[editor.inline-diagnostics]
# cursor-line = "warning"
cursor-line = "error"

[editor.statusline]
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"
left = ["mode", "spinner"]
center = ["file-name","read-only-indicator"]
right = ["diagnostics","version-control","selections","register","position","position-percentage","file-encoding"]
separator = "|"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = true
character = "|" # Some characters that work well: "▏", "┆", "┊", "⸽"
skip-levels = 1

# Keys
[keys.normal]
D = "delete_char_backward"
A-x = "extend_to_line_bounds"
X = "select_line_above"
# "A-," = "goto_previous_buffer"
# "A-." = "goto_next_buffer"
"A-w" = ":buffer-close"
# "A-/" = "repeat_last_motion"
C-g = [":new", ":insert-output lazygit", ":buffer-close!", ":redraw"]
C-x = ":reset-diff-change"
C-e = [
  ':sh rm -f /tmp/unique-file',
  ':insert-output yazi %{buffer_name} --chooser-file=/tmp/unique-file',
  ':insert-output echo "\x1b[?1049h\x1b[?2004h" > /dev/tty',
  ':open %sh{cat /tmp/unique-file}',
  ':redraw',
]

[keys.select]
A-x = "extend_to_line_bounds"
X = "select_line_above"
