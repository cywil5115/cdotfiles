keyword = "#8992a7"
operator = "#909398"
preproc = "#909398"
type = "#8ea4a2"
regex = "#c4746e"
deprecated = "#717C7C"
punct = "#909398"
comment = "#75797f"
special1 = "#c4b28a"
special2 = "#8992a7"
special3 = "#8992a7"
diag_error = "#C34043"
diag_ok = "#98BB6C"
diag_warning = "#DCA561"
diag_info = "#658594"
diag_hint = "#6A9589"
diff_add_bg = "#2B3328"
