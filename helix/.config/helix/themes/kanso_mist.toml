nontext = "#5C6066"
visual = "#393B44"
search = "#2D4F67"
cursor_bg = "#f2f1ef"
cursor_fg = "#22262D"
line_nr = "#75797f"
line_nr_active = "#f2f1ef"
menu_fg = "#f2f1ef"
menu_bg = "#22262D"
menu_sel = "#393B44"
float_fg = "#A4A7A4"
float_bg = "#22262D"
float_border = "#393B44"
string = "#8a9a7b"
number = "#a292a3"
constant = "#b6927b"
identifier = "#8992a7"
