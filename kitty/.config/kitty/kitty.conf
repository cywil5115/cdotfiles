#=========================
#Theme
#=========================
# include current-theme.conf
include ./themes/kanso_ink.conf

#=========================
#Font
#=========================
font_family Ioskeley Mono
font_size 19.0

#=========================
#Cell spacing (closest equivalent)
#=========================
adjust_line_height 5%
adjust_column_width 0%

#=========================
#Window padding
#=========================
window_padding_width 5

#=========================
#Colors / split-like UI
#=========================
inactive_text_alpha 0.90

#=========================
#Tabs / behavior
#=========================
tab_bar_style powerline
tab_bar_align left
active_tab_foreground   #ffffff
active_tab_background   #000000
inactive_tab_foreground #777777
inactive_tab_background #000000

# New tab in current context (approx)
startup_session none

#=========================
#Mouse / input
#=========================
mouse_hide_wait 3.0
macos_option_as_alt yes

#=========================
#Window behavior
#=========================
remember_window_size yes
initial_window_width  1200
initial_window_height 800
hide_window_decorations yes

#=========================
#Opacity / blur
#=========================
background_opacity 1

#=========================
#Cursor
#=========================
cursor_shape block
cursor_blink_interval 0.5
cursor_trail 0

#=========================
#Keyboard shortcuts
#=========================
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
map alt+0 goto_tab 10

map alt+enter new_window

map alt+left neighboring_window left
map alt+down neighboring_window bottom
map alt+up neighboring_window top
map alt+right neighboring_window right

map alt+shift+h move_window left
map alt+shift+j move_window bottom
map alt+shift+k move_window top
map alt+shift+l move_window right

map alt+q close_window

#=========================
#Performance / rendering
#=========================
repaint_delay 10
input_delay 3

#=========================
#Misc
#=========================
shell_integration no-cursor
